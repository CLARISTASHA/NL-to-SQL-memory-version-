# /etc/logrotate.d/task-report-agent
# Log rotation for Task Report Agent
# Runs daily, keeps 14 days of logs, compresses old files

/var/log/task_report_agent/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 ubuntu ubuntu
    sharedscripts
    postrotate
        # Reload app so it picks up the new log file
        systemctl reload task-report-agent 2>/dev/null || true
    endscript
}
